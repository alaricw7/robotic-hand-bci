noica_data_template = "data/processed/pythondata1/{subject}/{subject}_EEGNet_NoICA_uV.npz"
noica_checkpoint_template = "model/10fold_npz/experiments/pythondata1_npz_repr/representation/checkpoints/{subject}_eegnet_noica.pt"
ica_data_template = "data/processed/pythondata1_ICA/{subject}/{subject}_EEGNet_ICA_uV.npz"
